<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Streaming Mediasoup SFU</title>
    <!-- Memuat Tailwind CSS untuk styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Memuat Socket.io -->
       <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <!-- Memuat Mediasoup Client v3 -->
    <script src="https://unpkg.com/mediasoup-client@3/mediasoup-client.min.js"></script>
</head>
<body class="bg-gray-100 min-h-screen p-8 text-gray-800">
    <div class="max-w-5xl mx-auto">
        <header class="mb-8">
            <h1 class="text-3xl font-bold text-gray-900">Sistem Live Streaming (SFU)</h1>
            <p class="text-gray-500 mt-2">Mode Penyiar dan Penonton menggunakan Mediasoup</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <!-- Panel Penyiar -->
            <div class="bg-white p-6 rounded-lg shadow-md border-t-4 border-blue-500">
                <h2 class="text-xl font-semibold mb-4">Panel Penyiar (Broadcaster)</h2>
                <video id="localVideo" class="w-full bg-black rounded mb-4 aspect-video object-cover" autoplay muted playsinline></video>
                <div class="flex gap-2">
                    <button id="btnStartCamera" class="px-4 py-2 bg-gray-200 hover:bg-gray-300 text-gray-800 rounded font-medium transition-colors">Nyala Kamera</button>
                    <button id="btnPublish" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded font-medium transition-colors disabled:opacity-50" disabled>Mulai Siaran</button>
                </div>
            </div>

            <!-- Panel Penonton -->
            <div class="bg-white p-6 rounded-lg shadow-md border-t-4 border-green-500">
                <h2 class="text-xl font-semibold mb-4">Panel Penonton (Viewer)</h2>
                <video id="remoteVideo" class="w-full bg-black rounded mb-4 aspect-video object-cover" autoplay playsinline></video>
                <div class="flex gap-2 items-center">
                    <button id="btnSubscribe" class="px-4 py-2 bg-green-600 hover:bg-green-700 text-white rounded font-medium transition-colors hidden">Tonton Siaran</button>
                    <span id="statusStream" class="text-sm text-gray-500">Menunggu siaran dimulai...</span>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
         import * as mediasoupClient from 'https://esm.sh/mediasoup-client@3';
        // Menginisialisasi koneksi socket sesuai dengan path di server
        const socket = io({ path: '/live/socket.io' });
        
        let device;
        let localStream;
        let producerTransport;
        let consumerTransport;
        let remoteProducerId = null;

        // Elemen DOM
        const localVideo = document.getElementById('localVideo');
        const remoteVideo = document.getElementById('remoteVideo');
        const btnStartCamera = document.getElementById('btnStartCamera');
        const btnPublish = document.getElementById('btnPublish');
        const btnSubscribe = document.getElementById('btnSubscribe');
        const statusStream = document.getElementById('statusStream');

        // --- 1. Inisialisasi Device Mediasoup ---
        socket.on('connect', async () => {
            console.log('Terhubung ke server signaling');
            
            // Minta kemampuan router dari server
            socket.emit('getRouterRtpCapabilities', async (routerRtpCapabilities) => {
                device = new mediasoupClient.Device();
                await device.load({ routerRtpCapabilities });
                console.log('Mediasoup Device berhasil dimuat');
            });
        });

        // --- 2. Logika Penyiar (Broadcaster) ---
        btnStartCamera.addEventListener('click', async () => {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({
                    video: { width: 1280, height: 720 },
                    audio: true
                });
                localVideo.srcObject = localStream;
                btnPublish.disabled = false;
            } catch (error) {
                console.error('Gagal mengakses kamera:', error);
                alert('Tidak dapat mengakses kamera/mikrofon.');
            }
        });

        btnPublish.addEventListener('click', () => {
            socket.emit('createWebRtcTransport', {}, async (response) => {
                if (response.error) {
                    console.error(response.error);
                    return;
                }

                // Buat send transport di klien
                producerTransport = device.createSendTransport(response.params);

                // Event saat transport mencoba terhubung (DTLS)
                producerTransport.on('connect', async ({ dtlsParameters }, callback, errback) => {
                    try {
                        socket.emit('transport-connect', {
                            transportId: producerTransport.id,
                            dtlsParameters
                        });
                        callback();
                    } catch (error) {
                        errback(error);
                    }
                });

                // Event saat mempublikasikan track media
                producerTransport.on('produce', async (parameters, callback, errback) => {
                    try {
                        socket.emit('transport-produce', {
                            transportId: producerTransport.id,
                            kind: parameters.kind,
                            rtpParameters: parameters.rtpParameters,
                            appData: parameters.appData
                        }, ({ id }) => {
                            callback({ id });
                        });
                    } catch (error) {
                        errback(error);
                    }
                });

                // Mulai mengirim track video
                const videoTrack = localStream.getVideoTracks()[0];
                const videoProducer = await producerTransport.produce({ track: videoTrack });

                // Opsional: Lakukan hal yang sama untuk audio
                // const audioTrack = localStream.getAudioTracks()[0];
                // const audioProducer = await producerTransport.produce({ track: audioTrack });

                btnPublish.innerText = "Sedang Siaran";
                btnPublish.disabled = true;
            });
        });

        // --- 3. Logika Penonton (Viewer) ---
        
        // Mendengarkan jika ada produsen (penyiar) baru di room
        socket.on('new-producer', (producerId) => {
            remoteProducerId = producerId;
            statusStream.innerText = "Siaran tersedia!";
            statusStream.classList.replace('text-gray-500', 'text-green-600');
            btnSubscribe.classList.remove('hidden');
        });

        btnSubscribe.addEventListener('click', () => {
            if (!remoteProducerId) return;

            socket.emit('createWebRtcTransport', {}, async (response) => {
                if (response.error) {
                    console.error(response.error);
                    return;
                }

                // Buat receive transport di klien
                consumerTransport = device.createRecvTransport(response.params);

                consumerTransport.on('connect', async ({ dtlsParameters }, callback, errback) => {
                    try {
                        socket.emit('transport-connect', {
                            transportId: consumerTransport.id,
                            dtlsParameters
                        });
                        callback();
                    } catch (error) {
                        errback(error);
                    }
                });

                // Minta server untuk mulai mengirim media
                socket.emit('consume', {
                    producerId: remoteProducerId,
                    rtpCapabilities: device.rtpCapabilities,
                    transportId: consumerTransport.id
                }, async (response) => {
                    if (response.error) {
                        console.error(response.error);
                        return;
                    }

                    const consumer = await consumerTransport.consume({
                        id: response.params.id,
                        producerId: response.params.producerId,
                        kind: response.params.kind,
                        rtpParameters: response.params.rtpParameters
                    });

                    // Masukkan track yang diterima ke elemen video remote
                    const stream = new MediaStream();
                    stream.addTrack(consumer.track);
                    remoteVideo.srcObject = stream;

                    // Beritahu server untuk melanjutkan (resume) stream yang dijeda di awal
                    socket.emit('consumer-resume', { consumerId: consumer.id });

                    btnSubscribe.innerText = "Sedang Menonton";
                    btnSubscribe.disabled = true;
                });
            });
        });
    </script>
</body>
</html>
